<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 6px;
      font-family: sans-serif;
      font-size: 13px;
    }
    .option-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    input[type="checkbox"] {
      margin: 0;
      cursor: pointer;
    }
    label {
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="option-row" title="Removes the help button overlay.">
    <input type="checkbox" id="toggleWalkMe" checked>
    <label for="toggleWalkMe">Remove ESF Guide Me! button</label>
  </div>
  
  <div class="option-row" title="Removes the &quot;No due date&quot; tab in deadlines.">
    <input type="checkbox" id="toggleHideNoDue" checked>
    <label for="toggleHideNoDue">Remove "No due date" tab</label>
  </div>

  <div class="option-row" title="Removes the unread notifications popup from ever showing up.">
    <input type="checkbox" id="toggleUnreadNotifications" checked>
    <label for="toggleUnreadNotifications">Remove the unread notification popup</label>
  </div>

  <div class="option-row" title="Auto opens documents in new tabs instead of Toddle's custom document app.">
    <input type="checkbox" id="toggleAutoOpen" checked>
    <label for="toggleAutoOpen">Auto-open documents in new tabs</label>
  </div>

  <div class="option-row" title="Search subjects by name (e.g. &quot;chem&quot;) instead of codes.">
    <input type="checkbox" id="toggleAliases" checked>
    <label for="toggleAliases">Use subject names in search</label>
  </div>

  <div class="option-row" title="Automatically redirects you from IGCSE to IB courses.">
    <input type="checkbox" id="toggleRedirect" checked>
    <label for="toggleRedirect">Auto-Redirect to IB</label>
  </div>

  <div class="option-row" title="Adds a button to quickly scroll to the bottom of the classes page.">
    <input type="checkbox" id="toggleScrollBtn" checked>
    <label for="toggleScrollBtn">Add "Scroll to Bottom" button</label>
  </div>

  <div class="option-row" title="Removes excessive margins and makes the UI smaller">
    <input type="checkbox" id="toggleCompact">
    <label for="toggleCompact">Compact Mode</label>
  </div>

  <div class="option-row" title="Orders the classes to be at the top, and everything else to be below it.">
      <input type="checkbox" id="togglePriority">
      <label for="togglePriority">Prioritize Classes</label>
  </div>

  <div class="option-row" title="Adds a button to let you open and close all folders at once, does not work for subfolders.">
      <input type="checkbox" id="toggleFolderBtn">
      <label for="toggleFolderBtn">Add "Toggle Folders" button</label>
  </div>

  <p>Please reload your page after making changes. Use this extension at your own risk.</p>

  <div id="updateNotice" style="display: none; padding-bottom: 8px; margin-bottom: 8px;">
    <a href="https://github.com/wooffff/noddle" target="_blank">v<span id="remoteVersion"></span></a><span> now available. Click to download.</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
